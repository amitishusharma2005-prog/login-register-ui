<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Orbit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-hexagon-fill"></i> Orbit</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="index.html">Login</a></li>
        <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Log in to continue to your account</p>

    <form id="loginForm" class="needs-validation" novalidate>
      <div class="mb-3">
        <label for="loginEmail" class="form-label">Email address</label>
        <div class="input-group custom-input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required>
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>
      </div>

      <div class="mb-2">
        <label for="loginPassword" class="form-label">Password</label>
        <div class="input-group custom-input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" minlength="6" required>
          <button class="btn toggle-password" type="button" data-target="loginPassword" aria-label="Show password">
            <i class="bi bi-eye"></i>
          </button>
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
        </div>
        <a href="#" class="small link-muted">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary-custom w-100">Log In</button>

      <p class="text-center mt-4 mb-0 small">
        Don't have an account? <a href="register.html" class="link-strong">Create one</a>
      </p>
    </form>
  </div>
</main>

<footer class="app-footer">
  <div class="container text-center">
    <p class="mb-1">&copy; 2026 Orbit. Built by Amit Sharma.</p>
    <div class="footer-icons">
      <a href="#"><i class="bi bi-github"></i></a>
      <a href="#"><i class="bi bi-linkedin"></i></a>
      <a href="#"><i class="bi bi-envelope"></i></a>
    </div>
  </div>
</footer>

<div class="toast-container position-fixed top-0 end-0 p-3">
  <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body"><i class="bi bi-check-circle me-2"></i>Logged in! (Demo only — no backend yet)</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
